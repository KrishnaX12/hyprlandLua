# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Window
background_opacity 0.82
confirm_os_window_close 0

# Padding
window_padding_width 10

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Scrollback
scrollback_lines 10000

# Tabs
tab_bar_edge top
tab_bar_style powerline

# Enable ligatures
disable_ligatures never

# Colors (Tokyo Night inspired)
foreground #c0caf5
background #1a1b26
selection_foreground #1a1b26
selection_background #7aa2f7

# Black
color0 #15161e
color8 #414868

# Red
color1 #f7768e
color9 #f7768e

# Green
color2 #9ece6a
color10 #9ece6a

# Yellow
color3 #e0af68
color11 #e0af68

# Blue
color4 #7aa2f7
color12 #7aa2f7

# Magenta
color5 #bb9af7
color13 #bb9af7

# Cyan
color6 #7dcfff
color14 #7dcfff

# White
color7 #a9b1d6
color15 #c0caf5
